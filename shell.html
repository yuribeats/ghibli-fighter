<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SF2</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
  touch-action: none;
}
body.touch {
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
}
canvas {
  display: block;
  image-rendering: pixelated;
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}
body.touch canvas {
  width: 96vw;
  height: min(calc(96vw * 9 / 13), 42vh);
  flex-shrink: 0;
  margin-top: 6px;
}
#loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 2px;
}
#loading .bar {
  width: 200px;
  height: 4px;
  background: #333;
  margin-top: 16px;
}
#loading .fill {
  height: 100%;
  background: #fff;
  width: 0%;
  transition: width 0.2s;
}
#controls {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #5AB0E0;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-weight: bold;
  text-transform: uppercase;
  transition: opacity 0.5s;
  z-index: 10;
}
#controls .inner {
  text-align: center;
}
#controls h1 {
  font-size: 16px;
  letter-spacing: 4px;
  margin-bottom: 40px;
  font-weight: 700;
}
#controls .columns {
  display: flex;
  gap: 80px;
  justify-content: center;
  margin-bottom: 40px;
}
#controls .col h2 {
  font-size: 9px;
  color: #fff;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-bottom: 20px;
  font-weight: 700;
}
.key {
  display: inline-block;
  background: rgba(0,0,0,0.3);
  border: 2px solid #fff;
  padding: 6px 14px;
  margin: 3px;
  font-size: 10px;
  font-family: 'Press Start 2P', monospace;
  font-weight: bold;
  min-width: 40px;
  text-align: center;
}
.key-row {
  margin-bottom: 4px;
}
.label {
  font-size: 8px;
  color: #fff;
  opacity: 0.7;
  margin-top: 2px;
  letter-spacing: 1px;
}
.arrows {
  display: inline-block;
  text-align: center;
}
.arrows .key-row { display: block; }
.section {
  margin-top: 30px;
}
.section .entry {
  margin: 10px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
#blink {
  margin-top: 40px;
  font-size: 9px;
  letter-spacing: 3px;
}
#gamepad {
  display: none;
  width: 100%;
  flex: 1;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  pointer-events: none;
}
#gamepad > * { pointer-events: auto; }
#gp-top {
  grid-column: 1 / -1;
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 10px 0;
}
.gp-btn {
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.7);
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
.gp-btn.pressed {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.9);
  color: #fff;
}
.gp-meta { padding: 8px 16px; }
#gp-dpad {
  justify-self: center;
  align-self: center;
  position: relative;
  width: 140px;
  height: 140px;
  pointer-events: auto;
  touch-action: none;
}
.dpad-arrow {
  position: absolute;
  width: 46px;
  height: 46px;
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.7);
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.dpad-arrow.active {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.9);
  color: #fff;
}
.dpad-u { top: 0; left: 47px; }
.dpad-d { bottom: 0; left: 47px; }
.dpad-l { top: 47px; left: 0; }
.dpad-r { top: 47px; right: 0; }
#gp-attacks {
  justify-self: center;
  align-self: center;
  display: grid;
  grid-template-columns: repeat(3, 54px);
  grid-template-rows: repeat(2, 54px);
  gap: 6px;
}
.gp-atk {
  width: 54px;
  height: 54px;
  font-size: 8px;
}
</style>
</head>
<body>
<canvas id="canvas" width="832" height="576" oncontextmenu="event.preventDefault()" tabindex="1"></canvas>
<div id="loading">
  <div>LOADING</div>
  <div class="bar"><div class="fill" id="progress"></div></div>
</div>
<div id="controls" style="display:none;">
  <div class="inner">
    <h1>CONTROLS</h1>
    <div class="columns">
      <div class="col">
        <h2>MOVEMENT</h2>
        <div class="arrows">
          <div class="key-row"><span class="key">&#9650;</span></div>
          <div class="key-row">
            <span class="key">&#9664;</span>
            <span class="key">&#9660;</span>
            <span class="key">&#9654;</span>
          </div>
        </div>
      </div>
      <div class="col">
        <h2>ATTACKS</h2>
        <div class="key-row">
          <span class="key">Q</span>
          <span class="key">W</span>
          <span class="key">E</span>
        </div>
        <div class="key-row">
          <span class="label">LP</span>
          <span class="label" style="margin-left:24px;">MP</span>
          <span class="label" style="margin-left:24px;">HP</span>
        </div>
        <div class="key-row" style="margin-top:12px;">
          <span class="key">A</span>
          <span class="key">S</span>
          <span class="key">D</span>
        </div>
        <div class="key-row">
          <span class="label">LK</span>
          <span class="label" style="margin-left:24px;">MK</span>
          <span class="label" style="margin-left:24px;">HK</span>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="entry"><span class="key">5</span> INSERT COIN</div>
      <div class="entry"><span class="key">1</span> START</div>
      <div class="entry"><span class="key">-</span> / <span class="key">=</span> VOLUME</div>
    </div>
    <div style="margin-top:30px;font-size:12px;opacity:0.6;">MUSIC WILL PLAY</div>
    <div id="blink">TAP TO CONTINUE</div>
  </div>
</div>
<div id="gamepad">
  <div id="gp-top">
    <div class="gp-btn gp-meta" id="gp-voldn">VOL-</div>
    <div class="gp-btn gp-meta" data-kc="53" data-key="5">COIN</div>
    <div class="gp-btn gp-meta" data-kc="49" data-key="1">START</div>
    <div class="gp-btn gp-meta" id="gp-volup">VOL+</div>
  </div>
  <div id="gp-dpad">
    <div class="dpad-arrow dpad-u">&#9650;</div>
    <div class="dpad-arrow dpad-d">&#9660;</div>
    <div class="dpad-arrow dpad-l">&#9664;</div>
    <div class="dpad-arrow dpad-r">&#9654;</div>
  </div>
  <div id="gp-attacks">
    <div class="gp-btn gp-atk" data-kc="81" data-key="q">LP</div>
    <div class="gp-btn gp-atk" data-kc="87" data-key="w">MP</div>
    <div class="gp-btn gp-atk" data-kc="69" data-key="e">HP</div>
    <div class="gp-btn gp-atk" data-kc="65" data-key="a">LK</div>
    <div class="gp-btn gp-atk" data-kc="83" data-key="s">MK</div>
    <div class="gp-btn gp-atk" data-kc="68" data-key="d">HK</div>
  </div>
</div>
<script>
var Module = {
  canvas: (function() { return document.getElementById('canvas'); })(),
  onRuntimeInitialized: function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    document.getElementById('canvas').focus();
  },
  setStatus: function(text) {
    var m = text.match(/(\d+(\.\d+)?)\//);
    var p = document.getElementById('progress');
    if (m && p) {
      var pct = Math.min(100, (parseFloat(m[1]) / parseFloat(text.split('/')[1])) * 100);
      p.style.width = pct + '%';
    }
  },
  monitorRunDependencies: function(left) {
    if (left === 0) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('canvas').focus();
    }
  }
};
window.onerror = function() {
  document.getElementById('loading').innerHTML = '<div>ERROR</div>';
};
(function() {
  var blink = true;
  setInterval(function() {
    var el = document.getElementById('blink');
    if (el) el.style.visibility = blink ? 'visible' : 'hidden';
    blink = !blink;
  }, 500);
  function dismiss() {
    var c = document.getElementById('controls');
    if (c && c.style.display !== 'none') {
      c.style.opacity = '0';
      setTimeout(function() { c.style.display = 'none'; }, 500);
      document.getElementById('canvas').focus();
      var gp = document.getElementById('gamepad');
      if (gp && 'ontouchstart' in window) gp.style.display = 'grid';
    }
  }
  document.addEventListener('keydown', dismiss);
  document.addEventListener('mousedown', dismiss);
  document.addEventListener('touchstart', dismiss, {passive: false});
})();
// Touch gamepad
(function() {
  if (!('ontouchstart' in window)) return;
  document.body.classList.add('touch');
  var canvas = document.getElementById('canvas');

  var sent = {};
  function sendKey(type, keyCode, key) {
    var id = type[3] + keyCode;
    if (sent[id]) return;
    sent[id] = 1;
    requestAnimationFrame(function() { delete sent[id]; });
    canvas.dispatchEvent(new KeyboardEvent(type, {
      keyCode: keyCode, which: keyCode, key: key,
      bubbles: true, cancelable: true
    }));
  }

  // D-pad
  var dpad = document.getElementById('gp-dpad');
  var arrowEls = {
    up: dpad.querySelector('.dpad-u'),
    down: dpad.querySelector('.dpad-d'),
    left: dpad.querySelector('.dpad-l'),
    right: dpad.querySelector('.dpad-r')
  };
  var dirMap = {
    up: [38, 'ArrowUp'], down: [40, 'ArrowDown'],
    left: [37, 'ArrowLeft'], right: [39, 'ArrowRight']
  };
  var activeDirs = {};
  var dpadTid = null;

  function setDpad(touch) {
    var r = dpad.getBoundingClientRect();
    var dx = touch.clientX - (r.left + r.width / 2);
    var dy = touch.clientY - (r.top + r.height / 2);
    var dist = Math.sqrt(dx * dx + dy * dy);
    var nd = {};
    if (dist > r.width * 0.1) {
      var a = Math.atan2(dy, dx) * 180 / Math.PI;
      if (a > -67.5 && a < 67.5) nd.right = 1;
      if (a > 22.5 && a < 157.5) nd.down = 1;
      if (a > 112.5 || a < -112.5) nd.left = 1;
      if (a > -157.5 && a < -22.5) nd.up = 1;
    }
    var dirs = ['up', 'down', 'left', 'right'];
    for (var i = 0; i < 4; i++) {
      var d = dirs[i];
      if (nd[d] && !activeDirs[d]) {
        sendKey('keydown', dirMap[d][0], dirMap[d][1]);
        arrowEls[d].classList.add('active');
      } else if (!nd[d] && activeDirs[d]) {
        sendKey('keyup', dirMap[d][0], dirMap[d][1]);
        arrowEls[d].classList.remove('active');
      }
    }
    activeDirs = nd;
  }

  function clearDpad() {
    var dirs = ['up', 'down', 'left', 'right'];
    for (var i = 0; i < 4; i++) {
      if (activeDirs[dirs[i]]) {
        sendKey('keyup', dirMap[dirs[i]][0], dirMap[dirs[i]][1]);
        arrowEls[dirs[i]].classList.remove('active');
      }
    }
    activeDirs = {};
  }

  dpad.addEventListener('touchstart', function(e) {
    e.preventDefault();
    dpadTid = e.changedTouches[0].identifier;
    setDpad(e.changedTouches[0]);
  }, {passive: false});
  dpad.addEventListener('touchmove', function(e) {
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++)
      if (e.changedTouches[i].identifier === dpadTid) setDpad(e.changedTouches[i]);
  }, {passive: false});
  dpad.addEventListener('touchend', function(e) {
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++)
      if (e.changedTouches[i].identifier === dpadTid) { clearDpad(); dpadTid = null; }
  }, {passive: false});
  dpad.addEventListener('touchcancel', function() { clearDpad(); dpadTid = null; });

  // Buttons
  var btns = document.querySelectorAll('.gp-btn');
  for (var b = 0; b < btns.length; b++) (function(btn) {
    var kc = parseInt(btn.dataset.kc), key = btn.dataset.key;
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      sendKey('keydown', kc, key);
      btn.classList.add('pressed');
    }, {passive: false});
    btn.addEventListener('touchend', function(e) {
      e.preventDefault();
      sendKey('keyup', kc, key);
      btn.classList.remove('pressed');
    }, {passive: false});
    btn.addEventListener('touchcancel', function() {
      sendKey('keyup', kc, key);
      btn.classList.remove('pressed');
    });
  })(btns[b]);
})();
// Volume control
(function() {
  var vol = parseFloat(localStorage.getItem('sf2vol') || '0.5');
  var _audio = null;
  Object.defineProperty(window, '_sf2audio', {
    get: function() { return _audio; },
    set: function(v) {
      _audio = v;
      if (v && typeof v.volume !== 'undefined') v.volume = vol;
    },
    configurable: true
  });
  var hud = document.createElement('div');
  hud.style.cssText = 'position:fixed;top:10px;right:10px;color:#fff;font-family:"Press Start 2P",monospace;font-size:10px;z-index:99;opacity:0;transition:opacity 0.3s;pointer-events:none;text-shadow:1px 1px 2px #000;';
  document.body.appendChild(hud);
  var hideTimer;
  function applyVol() {
    if (_audio) _audio.volume = vol;
    localStorage.setItem('sf2vol', String(vol));
  }
  function showVol() {
    hud.textContent = 'VOL ' + Math.round(vol * 100) + '%';
    hud.style.opacity = '1';
    clearTimeout(hideTimer);
    hideTimer = setTimeout(function() { hud.style.opacity = '0'; }, 1200);
    applyVol();
  }
  function adjVol(d) {
    vol = Math.max(0, Math.min(1, Math.round((vol + d) * 20) / 20));
    showVol();
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === '-' || e.key === '_') adjVol(-0.05);
    else if (e.key === '=' || e.key === '+') adjVol(0.05);
  });
  var vu = document.getElementById('gp-volup');
  var vd = document.getElementById('gp-voldn');
  if (vu) vu.addEventListener('touchstart', function(e) { e.preventDefault(); adjVol(0.1); }, {passive:false});
  if (vd) vd.addEventListener('touchstart', function(e) { e.preventDefault(); adjVol(-0.1); }, {passive:false});
})();
</script>

</html>
